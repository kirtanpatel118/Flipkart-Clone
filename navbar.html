<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./public/stylesheet/navbar.css">
    <title>Navbar</title>
</head>

<body>
    <nav>
        <div id="nav">
            <div id="nav1">
                <span id="logo_name" onclick="window.location.href='index.html'">Flipkart
                    <span style="font-style:italic;font-size:11px;color:#ffe500;">&#9733;</span>
                </span>
                <span style="color: #ffe500; font-size: 11px; font-style: italic; font-family: sans-serif;">
                    Explore <span style="color:#fff;">Plus</span>
                </span>
            </div>

            <div class="nav2" id="searchbar">
                <span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10.5 18C14.6421 18 18 14.6421 18 10.5C18 6.35786 14.6421 3 10.5 3C6.35786 3 3 6.35786 3 10.5C3 14.6421 6.35786 18 10.5 18Z" stroke="#2874F0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 16L21 21" stroke="#2874F0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <input id="input_data" type="text" placeholder="Search for Products, Brands and More"
                    oninput="handleSearch(this.value)" />
            </div>

            <!-- Hamburger for mobile -->
            <div id="hamburger" onclick="toggleNav()" aria-label="Menu">
                <span></span><span></span><span></span>
            </div>

            <div id="nav-links">
                <div class="nav2">
                    <img src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/profile-52e0dc.svg" alt="login" width="20" height="20">
                    <a href="./signin.html">Login</a>
                </div>
                <div class="nav2">
                    <img src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/header_cart-eed150.svg" alt="cart" width="20" height="20">
                    <span>Cart</span>
                </div>
                <div class="nav2">
                    <img src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/Store-9eeae2.svg" alt="become a seller" width="20" height="20">
                    <span>Become a Seller</span>
                </div>
                <div class="nav2">
                    <img src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/header_3verticalDots-ea7819.svg" alt="more" width="20" height="20">
                </div>
            </div>
        </div>
    </nav>

    <script>
        function toggleNav() {
            var links = document.getElementById('nav-links');
            links.classList.toggle('open');
        }

        function handleSearch(val) {
            /* Basic search filter — extend as needed */
        }
    </script>
</body>

</html>
