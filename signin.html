<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./public/stylesheet/signin.css">
    <link rel="shortcut icon" href="./public/images/flipkart-logo-icon-hd-png-701751694706828v1habfry9b.png" type="image/x-icon">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <title>Login – Flipkart</title>
</head>

<body>
    <header>
        <div id="container"></div>
    </header>
    <main>
        <div id="outerbox">
            <div id="innerbox">
                <div class="leftinnerbox">
                    <p class="para1">Login</p>
                    <p class="para2">Get access to your Orders, Wishlist and Recommendations</p>
                </div>
                <div class="rightinnerbox">
                    <div style="margin-top: 20px;">
                        <input id="phone" class="mobile" type="number" placeholder="Enter Mobile Number" />
                    </div>
                    <div style="margin-top: 20px;">
                        <input id="pass" class="password" type="password" placeholder="Enter Password" />
                    </div>
                    <p class="textm">By continuing, you agree to Flipkart's
                        <span style="color:#2874F0;">Terms of Use</span> and
                        <span style="color:#2874F0;">Privacy Policy.</span>
                    </p>
                    <button class="continue btn-login" onclick="Signin()">Login</button>
                    <button class="continue btn-new" onclick="signup()">New to Flipkart? Create an account</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div id="container1"></div>
    </footer>

    <script src="./public/javascripts/signin.js"></script>
    <script>
        $(function () { $("#container").load('./navbar.html'); });
        $(function () { $("#container1").load('./footer.html'); });
    </script>
</body>

</html>
