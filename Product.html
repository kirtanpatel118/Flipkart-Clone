<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./public/stylesheet/Product.css">
    <link rel="shortcut icon" href="./public/images/flipkart_logo_transparent.png" type="image/x-icon">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <title>Products – Flipkart</title>
</head>

<body>
    <header>
        <div id="container"></div>
    </header>

    <main>
        <section id="products">
            <div id="filter-sidebar">
                <p>Filters</p>
                <p style="font-size:13px;color:#878787;font-weight:normal;">Brand</p>
                <label style="display:block;font-size:13px;padding:4px 0;"><input type="checkbox"> Arrow</label>
                <label style="display:block;font-size:13px;padding:4px 0;"><input type="checkbox"> Puma</label>
                <br>
                <p style="font-size:13px;color:#878787;font-weight:normal;">Price Range</p>
                <label style="display:block;font-size:13px;padding:4px 0;"><input type="checkbox"> Under ₹1,000</label>
                <label style="display:block;font-size:13px;padding:4px 0;"><input type="checkbox"> ₹1,000 – ₹5,000</label>
                <label style="display:block;font-size:13px;padding:4px 0;"><input type="checkbox"> Above ₹5,000</label>
            </div>
            <div id="right-content">
                <div id="topmenu">
                    <span>Sort By</span>
                    <span>Popularity</span>
                    <span>Price — Low to High</span>
                    <span>Price — High to Low</span>
                    <span>Newest First</span>
                </div>
                <div id="collection"></div>
                <div id="collection2"></div>
            </div>
        </section>
    </main>

    <footer>
        <div id="container1"></div>
    </footer>

    <script>
        $(function () { $("#container").load('./navbar.html'); });
        $(function () { $("#container1").load('./footer.html'); });
    </script>
    <script src="./public/javascripts/Product.js"></script>
</body>

</html>
